<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gate preview (browser entry + tournament banner)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --color-gray-400:#6B7280; --color-gray-500:#4B5563; --color-gray-700:#1F2937;
    --color-base-blue:#4A90D9; --color-base-dark:#1E3A5F; --color-success:#22C55E;
    --color-bg-start:#C4D4E8; --color-bg-end:#E8EFF8;
    --radius-2xl:1.25rem;
    --shadow-card:0 8px 32px rgba(30,58,95,.15),0 2px 8px rgba(30,58,95,.1);
    --shadow-button:0 4px 12px rgba(74,144,217,.3);
    --font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-family);}
  .preview-tag{position:fixed;top:8px;left:8px;background:#1E3A5F;color:#fff;font-size:11px;
    padding:4px 10px;border-radius:6px;font-weight:700;z-index:9999;opacity:.85;}
  .card-corner{position:absolute;width:12px;height:12px;border:2px solid rgba(74,144,217,.3);pointer-events:none;}
  .card-corner-tl{top:8px;left:8px;border-right:none;border-bottom:none;border-radius:4px 0 0 0;}
  .card-corner-tr{top:8px;right:8px;border-left:none;border-bottom:none;border-radius:0 4px 0 0;}
  .card-corner-bl{bottom:8px;left:8px;border-right:none;border-top:none;border-radius:0 0 0 4px;}
  .card-corner-br{bottom:8px;right:8px;border-left:none;border-top:none;border-radius:0 0 4px 0;}

  .base-gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow-y:auto;
    padding:12px;color:var(--color-gray-700);background:linear-gradient(180deg,var(--color-bg-start),var(--color-bg-end));}
  .base-gate-frame{position:relative;width:min(600px,100%);min-height:min(740px,calc(100dvh - 24px));
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:46px 26px;text-align:center;
    border:1px solid rgba(255,255,255,.7);border-radius:var(--radius-2xl);box-shadow:var(--shadow-card);overflow:hidden;
    background:
      repeating-linear-gradient(0deg,rgba(160,180,200,.08) 0,rgba(160,180,200,.08) 1px,transparent 1px,transparent 20px),
      repeating-linear-gradient(90deg,rgba(160,180,200,.08) 0,rgba(160,180,200,.08) 1px,transparent 1px,transparent 20px),
      linear-gradient(180deg,rgba(200,215,235,.95) 0%,rgba(235,242,250,.98) 70%,rgba(240,245,252,.98) 100%);
    background-size:20px 20px,20px 20px,100% 100%;}
  .base-gate-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;color:var(--color-base-dark);
    font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(255,255,255,.72);
    border:1px solid rgba(74,144,217,.2);border-radius:20px;}
  .base-gate-badge-dot{width:9px;height:9px;border-radius:50%;background:var(--color-success);}
  .base-gate-title{margin:0;color:var(--color-base-dark);font-size:40px;font-weight:800;line-height:1.05;letter-spacing:-1px;}
  .base-gate-copy{max-width:308px;margin:0 0 16px;color:var(--color-gray-500);font-size:16px;line-height:1.5;}
  .base-gate-button{display:inline-flex;align-items:center;justify-content:center;width:min(292px,100%);min-height:58px;
    font-size:17px;font-weight:700;letter-spacing:.3px;border-radius:.75rem;border:none;text-decoration:none;cursor:pointer;
    background:linear-gradient(180deg,#6BA8E8,#4A88C8);color:#fff;box-shadow:var(--shadow-button);
    animation:gp-pulse 1.7s ease-in-out infinite;}
  @keyframes gp-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  .base-gate-link{margin:7px 0 0;color:var(--color-gray-400);font-family:"SF Mono",monospace;font-size:12px;}
  .base-gate-credit{margin:14px 0 0;color:var(--color-gray-400);font-size:11px;letter-spacing:.2px;}
  .base-gate-credit a{color:var(--color-base-blue);font-weight:600;text-decoration:none;}
  .base-gate-ground{position:absolute;right:20px;bottom:26px;left:20px;height:4px;
    background:linear-gradient(90deg,transparent,rgba(74,144,217,.55),transparent);border-radius:2px;}

  /* tournament banner (copied from wallet.css) */
  .gate-tournament{width:min(320px,100%);margin:4px 0 2px;padding:10px 14px;border-radius:16px;
    background:linear-gradient(135deg,#4A90D9,#2A6BB8);color:#fff;box-shadow:0 6px 18px rgba(42,107,184,.4);}
  .gate-tournament-row{display:flex;align-items:center;justify-content:center;gap:8px;}
  .gate-tournament-live{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:1px;
    text-transform:uppercase;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:999px;}
  .gate-tournament-dot{width:6px;height:6px;border-radius:50%;background:#ff5252;animation:gate-tlive 1.2s ease-in-out infinite;}
  @keyframes gate-tlive{0%,100%{opacity:1}50%{opacity:.25}}
  .gate-tournament-title{font-size:15px;font-weight:800;}
  .gate-tournament-pool{font-size:14px;font-weight:800;color:#1E3A5F;background:linear-gradient(180deg,#FFE259,#FFC400);
    padding:2px 10px;border-radius:999px;box-shadow:0 3px 8px rgba(255,196,0,.4);}
  .gate-tournament-sub{margin-top:6px;font-size:11px;font-weight:600;text-align:center;color:rgba(255,255,255,.92);font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
  <div class="preview-tag">PREVIEW — browser gate (what desktop visitors see)</div>
  <div class="base-gate">
    <main class="base-gate-frame">
      <div class="card-corner card-corner-tl"></div>
      <div class="card-corner card-corner-tr"></div>
      <div class="card-corner card-corner-bl"></div>
      <div class="card-corner card-corner-br"></div>
      <div class="base-gate-badge"><span class="base-gate-badge-dot"></span>BASE APP ONLY</div>

      <div class="gate-tournament">
        <div class="gate-tournament-row">
          <span class="gate-tournament-live"><span class="gate-tournament-dot"></span>LIVE</span>
          <span class="gate-tournament-title">🏆 Tournament</span>
          <span class="gate-tournament-pool">$50</span>
        </div>
        <div class="gate-tournament-sub">Top 3 on the leaderboard win · ends in <span id="t">--</span></div>
      </div>

      <h1 class="base-gate-title">RUG PULL RUN</h1>
      <p class="base-gate-copy">Open the game inside Base App to connect your wallet and play.</p>
      <a class="base-gate-button" href="https://base.app/app/rugpullrun.app">Open in Base App</a>
      <p class="base-gate-link">base.app/app/rugpullrun.app</p>
      <p class="base-gate-credit">Created by <a href="https://x.com/devilonnn">@devilonnn</a></p>
      <div class="base-gate-ground"></div>
    </main>
  </div>
  <script>
    var END=Date.parse('2026-06-22T00:00:00+03:00');
    function fmt(ms){if(ms<=0)return'Ended';var t=Math.floor(ms/60000),d=Math.floor(t/1440),h=Math.floor((t%1440)/60),m=t%60;return d+'d '+String(h).padStart(2,'0')+'h '+String(m).padStart(2,'0')+'m';}
    function tick(){document.getElementById('t').textContent=fmt(END-Date.now());}
    tick();setInterval(tick,30000);
  </script>
</body>
</html>
